services:
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      - TZ=UTC
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./assets/fastembed:/app/assets/fastembed
      - ./assets/reranker:/app/assets/reranker
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    networks:
      - app_network

  db:
    image: mysql:8.4
    command: >
      --innodb_ft_min_token_size=1
      --innodb_ft_enable_stopword=0
      --default-time-zone=+00:00
    environment:
      - MYSQL_ROOT_PASSWORD=***
      - MYSQL_DATABASE=ragwebui
      - MYSQL_USER=ragwebui
      - MYSQL_PASSWORD=***
      - TZ=UTC
    ports:
      - "3306:3306"
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "$$MYSQL_USER",
          "--password=$$MYSQL_PASSWORD",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      - TZ=UTC
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./docker-data/qdrant:/qdrant/storage
    networks:
      - app_network

  neo4j:
    image: neo4j:2026.04.0-community-trixie
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/...o4j}
      - NEO4J_PLUGINS=["apoc"]
      - TZ=UTC
    volumes:
      - ./docker-data/neo4j/data:/data
      - ./docker-data/neo4j/logs:/logs
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    networks:
      - app_network
    depends_on:
      - db

networks:
  app_network:
    driver: bridge
