services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DEBUG=1
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
      - ./assets:/app/assets
    networks:
      - app_network
    depends_on:
      - db
      - qdrant
      - neo4j
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: node server.js
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NODE_ENV=development
      - BACKEND_URL=http://backend:8000
      - BACKEND_HOST=backend
      - BACKEND_PORT=8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:8.4
    command: >
      --innodb_ft_min_token_size=1
      --innodb_ft_enable_stopword=0
      --default-time-zone=+00:00
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=ragwebui
      - MYSQL_USER=ragwebui
      - MYSQL_PASSWORD=ragwebui
      - TZ=UTC
    ports:
      - "3306:3306"
    volumes:
      - ./docker-data/mysql:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d:ro
    networks:
      - app_network

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      - TZ=UTC
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./docker-data/qdrant:/qdrant/storage
    networks:
      - app_network

  neo4j:
    image: neo4j:2026.04.0-community-trixie
    ports:
      - "7474:7474"   # HTTP browser UI
      - "7687:7687"   # Bolt wire protocol
    environment:
      - NEO4J_AUTH=neo4j/ragwebui_neo4j
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - TZ=UTC
    volumes:
      - ./docker-data/neo4j/data:/data
      - ./docker-data/neo4j/logs:/logs
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    networks:
      - app_network
    depends_on:
      - db

networks:
  app_network:
    driver: bridge
